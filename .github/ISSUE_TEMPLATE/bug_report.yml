name: Bug report
description: Report a bug or unexpected behaviour in ZigbeeLens
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do **not** paste MQTT passwords, network keys, or raw config secrets.

  - type: dropdown
    id: install-path
    attributes:
      label: Install path
      options:
        - Home Assistant OS add-on
        - Docker / Compose
        - Local development
        - HACS companion connected to Core
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ZigbeeLens version
      placeholder: "0.1.13"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start ZigbeeLens with ...
        2. Open ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact secrets. Include Core/add-on logs if available.
      render: shell

  - type: dropdown
    id: report-attached
    attributes:
      label: Did you attach a redacted ZigbeeLens report?
      options:
        - "No"
        - "Yes — public_safe or strict profile"
        - "Yes — standard profile (local troubleshooting only)"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Zigbee2MQTT version:
        - Number of networks:
        - Approximate device count:
        - Browser (if UI issue):
