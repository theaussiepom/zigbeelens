name: Release check

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ha-integration-matrix:
    name: HA ${{ matrix.homeassistant }} / Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: minimum
            homeassistant: "2025.1.0"
            python: "3.12"
          - lane: current
            homeassistant: "2026.7.3"
            python: "3.14"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run the exact Home Assistant compatibility lane
        env:
          ZIGBEELENS_HA_TEST_PYTHON: python
        run: bash scripts/test-ha-integration-matrix.sh "${{ matrix.lane }}"

  enrichment-live-e2e:
    name: Live HA enrichment convergence / Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true

      - name: Install Core dependencies
        run: uv sync --project apps/core --python 3.12 --extra dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @zigbeelens/shared build

      - name: Run canonical live enrichment E2E
        run: bash scripts/test-enrichment-live-e2e.sh

  release-gate:
    needs: [ha-integration-matrix, enrichment-live-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pnpm install
          pnpm --filter @zigbeelens/shared build
          pip install -e "apps/core[dev]"

      - name: Version alignment
        run: bash scripts/check-version-alignment.sh

      - name: Verify release tag matches package version
        run: |
          version="$(sed -nE 's/.*\"version\": \"([^\"]+)\".*/\1/p' package.json | head -1)"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Cross-surface contracts and documentation
        run: bash scripts/validate-contracts.sh

      - name: Ruff
        run: ruff check apps/core/src apps/core/tests

      - name: Backend tests
        run: pytest apps/core/tests -q
        env:
          PYTHONPATH: apps/core/src

      - name: Performance baselines
        run: pytest apps/core/tests/performance -q
        env:
          PYTHONPATH: apps/core/src

      - name: SQLite 3.34.1 runtime smoke
        run: bash scripts/smoke-sqlite-3.34.1.sh

      - name: UI tests, typecheck, lint, and build
        run: |
          pnpm --filter @zigbeelens/ui test
          pnpm --filter @zigbeelens/ui typecheck
          pnpm --filter @zigbeelens/ui lint
          pnpm --filter @zigbeelens/ui build

      - name: HA integration validation
        run: bash scripts/validate-ha-integration.sh --skip-matrix

      - name: HACS repo packaging
        run: |
          bash scripts/package-hacs-repo.sh
          bash dist/zigbeelens-hacs/scripts/validate-hacs-repo.sh

      - name: Add-on validation and packaged-repository validation
        run: |
          bash scripts/validate-addon.sh
          bash scripts/package-addon-repo.sh
          bash dist/zigbeelens-addons/scripts/validate-addon-repo.sh

      - name: Compose validation
        run: ZIGBEELENS_REQUIRE_DOCKER_COMPOSE=1 bash scripts/validate-compose.sh

      - name: Core smoke
        run: bash scripts/smoke-core.sh

      - name: Safety guardrails
        run: bash scripts/validate-safety-guardrails.sh
        env:
          CORE_PYTHON: python3
          PYTHONPATH: apps/core/src
