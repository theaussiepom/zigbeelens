name: Docker

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/zigbeelens

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deployment tests
        run: |
          pip install -e "apps/core[dev]"
          pytest apps/core/tests/test_docker_deploy.py apps/core/tests/test_logging_config.py -q
        env:
          PYTHONPATH: apps/core/src

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=edge,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Read package version
        id: version
        run: |
          echo "value=$(sed -nE 's/.*\"version\": \"([^\"]+)\".*/\1/p' package.json | head -1)" >> "$GITHUB_OUTPUT"

      - name: Verify release versions are aligned
        run: bash scripts/check-version-alignment.sh

      - name: Verify release tag is strict SemVer and matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          python3 - "$PACKAGE_VERSION" "$GITHUB_REF_NAME" <<'PY'
          import re
          import sys

          version, tag = sys.argv[1:]
          semver = re.compile(
              r"^(0|[1-9][0-9]*)\."
              r"(0|[1-9][0-9]*)\."
              r"(0|[1-9][0-9]*)"
              r"(?:-(?:0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)"
              r"(?:\.(?:0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*)?"
              r"(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$"
          )
          if semver.fullmatch(version) is None:
              raise SystemExit(f"package version is not strict SemVer: {version}")
          if tag != f"v{version}":
              raise SystemExit(f"tag {tag} does not match package version v{version}")
          PY

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.repository == format('{0}/zigbeelens', github.repository_owner)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.repository == format('{0}/zigbeelens', github.repository_owner) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
