name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [contracts]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e "apps/core[dev]"

      - name: Ruff
        run: ruff check apps/core/src apps/core/tests

      - name: Version alignment
        run: bash scripts/check-version-alignment.sh

      - name: Pytest
        run: pytest apps/core/tests -q
        env:
          PYTHONPATH: apps/core/src

  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Core
        run: pip install -e "apps/core[dev]"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install

      - name: Build shared types
        run: pnpm --filter @zigbeelens/shared build

      - name: Contract lane
        run: bash scripts/validate-contracts.sh

  ui:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [contracts]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install

      - name: Build shared types
        run: pnpm --filter @zigbeelens/shared build

      - name: Lint UI (typecheck)
        run: pnpm --filter @zigbeelens/ui lint

      - name: Typecheck UI
        run: pnpm --filter @zigbeelens/ui typecheck

      - name: UI tests
        run: pnpm --filter @zigbeelens/ui test

      - name: UI production build
        run: pnpm --filter @zigbeelens/ui build

  ha-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate HA integration
        run: bash scripts/validate-ha-integration.sh

      - name: Package HACS release layout
        run: bash scripts/package-hacs-repo.sh

      - name: Verify HACS repo layout
        run: test -f dist/zigbeelens-hacs/custom_components/zigbeelens/manifest.json

  packaging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [contracts, backend, ui, ha-integration]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pnpm install
          pnpm --filter @zigbeelens/shared build
          pip install -e "apps/core[dev]"

      - name: Validate add-on packaging
        run: bash scripts/validate-addon.sh

      - name: Validate Docker compose examples
        run: ZIGBEELENS_REQUIRE_DOCKER_COMPOSE=1 bash scripts/validate-compose.sh

      - name: Package add-on repository layout
        run: |
          bash scripts/package-addon-repo.sh
          bash dist/zigbeelens-addons/scripts/validate-addon-repo.sh

      - name: Core smoke test
        run: bash scripts/smoke-core.sh

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e "apps/core[dev]"

      - name: Deployment tests
        run: pytest apps/core/tests/test_docker_deploy.py apps/core/tests/test_logging_config.py -q
        env:
          PYTHONPATH: apps/core/src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read package version
        id: version
        run: |
          echo "value=$(sed -nE 's/.*\"version\": \"([^\"]+)\".*/\1/p' package.json | head -1)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: zigbeelens:ci
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
