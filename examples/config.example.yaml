server:
  # Core defaults to 127.0.0.1 when omitted. Use 0.0.0.0 only for containers
  # or other intentionally remote-capable binds.
  host: 127.0.0.1
  port: 8377

mode:
  mock: true
  default_scenario: four_devices_same_room_unavailable

# Prefer environment or *_FILE injection for secrets instead of YAML.
# Canonical variables:
#   ZIGBEELENS_SECURITY_MODE
#   ZIGBEELENS_SECURITY_API_TOKEN / ZIGBEELENS_SECURITY_API_TOKEN_FILE
#   ZIGBEELENS_SECURITY_SESSION_SECRET / ZIGBEELENS_SECURITY_SESSION_SECRET_FILE
#   ZIGBEELENS_MQTT_USERNAME
#   ZIGBEELENS_MQTT_PASSWORD / ZIGBEELENS_MQTT_PASSWORD_FILE
# Temporary alias: ZIGBEELENS_API_KEY (conflicts with canonical API-token vars).
security:
  mode: local

mqtt:
  server: mqtt://mosquitto:1883
  username: ""
  password: ""
  client_id: zigbeelens
  tls:
    enabled: false
    reject_unauthorized: true

networks:
  - id: home
    name: Home
    base_topic: zigbee2mqtt

  - id: home2
    name: Home 2
    base_topic: zigbee2mqtt-home2

storage:
  path: ./data/zigbeelens.sqlite
  retention_days: 7

diagnostics:
  incident_window_seconds: 180
  stale_after_hours: 24
  low_battery_percent: 20
  weak_link_threshold: 40
  flapping_threshold: 3
  recently_unstable_window_hours: 24
  bridge_stale_after_minutes: 10
  mains_stale_after_hours: 12
  battery_stale_after_hours: 48
  incident_watch_window_minutes: 30
  incident_resolution_grace_minutes: 5
  network_wide_device_percent: 25
  network_wide_min_devices: 5
  correlated_min_devices: 2
  stale_cluster_min_devices: 3
  low_battery_cluster_min_devices: 3
  interview_failure_min_devices: 2

features:
  mqtt_collector: true
  mqtt_discovery: true
  bridge_logs: true
  device_payload_history: true
  manual_network_map: true
  automatic_network_map: false

reporting:
  max_recent_events: 100
  max_metric_samples_per_device: 50
  max_availability_changes_per_device: 50
  include_raw_payloads: false
  default_profile: standard
