server:
  host: 127.0.0.1
  port: 8377

mode:
  mock: false

# Keep secrets out of committed YAML. Prefer:
# - ZIGBEELENS_SECURITY_API_TOKEN / ZIGBEELENS_SECURITY_API_TOKEN_FILE
# - ZIGBEELENS_SECURITY_SESSION_SECRET / ZIGBEELENS_SECURITY_SESSION_SECRET_FILE
# - ZIGBEELENS_MQTT_USERNAME
# - ZIGBEELENS_MQTT_PASSWORD / ZIGBEELENS_MQTT_PASSWORD_FILE
security:
  mode: local
  cors_allowed_origins: []
  frame_ancestor_origins: []

mqtt:
  # Replace this reserved example hostname with your broker address.
  server: mqtt://mqtt.example.invalid:1883
  username: ""
  password: ""
  client_id: zigbeelens
  tls:
    enabled: false
    reject_unauthorized: true

networks:
  - id: home
    name: Home
    base_topic: zigbee2mqtt

storage:
  path: ./data/zigbeelens.sqlite
  # Telemetry history only — not reports/incidents.
  retention_days: 7
  # Resolved incidents (default/omit = 90 days; explicit null = keep indefinitely).
  resolved_incident_retention_days: 90
  # Reports default null = until manually deleted.
  # report_retention_days: null
  maintenance_interval_hours: 24

diagnostics:
  incident_window_seconds: 180
  stale_after_hours: 24
  low_battery_percent: 20
  weak_link_threshold: 40
  flapping_threshold: 3
  recently_unstable_window_hours: 24
  bridge_stale_after_minutes: 10
  mains_stale_after_hours: 12
  battery_stale_after_hours: 48
  incident_watch_window_minutes: 30
  incident_resolution_grace_minutes: 5
  network_wide_device_percent: 25
  network_wide_min_devices: 5
  correlated_min_devices: 2
  stale_cluster_min_devices: 3
  low_battery_cluster_min_devices: 3
  interview_failure_min_devices: 2

features:
  mqtt_collector: true
  mqtt_discovery: false
  bridge_logs: true
  device_payload_history: true
  manual_network_map: false
  automatic_network_map: false

reporting:
  max_recent_events: 100
  max_metric_samples_per_device: 50
  max_availability_changes_per_device: 50
  include_raw_payloads: false
  # standard | strict | public_safe
  default_profile: standard

mqtt_discovery:
  # Effective only when features.mqtt_discovery is also true.
  enabled: true
  topic_prefix: homeassistant
  state_topic_prefix: zigbeelens
  retain: true
  device_name: ZigbeeLens
  object_id_prefix: zigbeelens

topology:
  enabled: true
  # Startup scan may publish the allowlisted Zigbee2MQTT network-map request.
  startup_scan: true
  startup_stable_delay_seconds: 60
  refresh_interval_seconds: 0
  manual_capture_enabled: false
  automatic_capture_enabled: false
  capture_on_incident: false
  max_snapshots_per_network: 30
  warn_before_capture: true
