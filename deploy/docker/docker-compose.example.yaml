# Standalone ZigbeeLens — copy to docker-compose.yaml and adjust.
#
# From the repository root:
#   mkdir -p zigbeelens/config zigbeelens/data
#   cp deploy/docker/docker-compose.example.yaml zigbeelens/docker-compose.yaml
#   cp deploy/docker/config.example.yaml zigbeelens/config/config.yaml
#   cd zigbeelens
#   docker compose up -d
#
# Port 8377 is published on the Docker host for convenient local/trusted-network access.
# Core binds from AppConfig (Docker examples use server.host=0.0.0.0). Only the optional
# bearer/session authentication you configure protects Core; local/no-token remains
# trusted-open. If Core is reachable beyond users or networks you trust, access-control
# decisions are yours. Use "127.0.0.1:8377:8377" for loopback-only host access.
#
# Image: replace ghcr.io/theaussiepom/zigbeelens with your registry path.

services:
  zigbeelens:
    image: ghcr.io/theaussiepom/zigbeelens:latest
    container_name: zigbeelens
    restart: unless-stopped
    ports:
      - "8377:8377"
    environment:
      ZIGBEELENS_CONFIG: /config/config.yaml
      ZIGBEELENS_LOG_LEVEL: info
      TZ: UTC
    volumes:
      - ./config:/config:ro
      - ./data:/data
    # Healthcheck is defined in deploy/docker/Dockerfile (GET /healthz).
