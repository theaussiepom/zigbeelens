# Standalone ZigbeeLens — copy to docker-compose.yaml and adjust.
#
# Quick start:
#   mkdir -p config data
#   cp deploy/docker/config.example.yaml config/config.yaml
#   docker compose -f deploy/docker/docker-compose.example.yaml up -d
#
# Image: replace ghcr.io/theaussiepom/zigbeelens with your registry path.
# TODO: set GHCR owner when repository is published.

services:
  zigbeelens:
    image: ghcr.io/theaussiepom/zigbeelens:latest
    container_name: zigbeelens
    restart: unless-stopped
    ports:
      - "8377:8377"
    environment:
      ZIGBEELENS_CONFIG: /config/config.yaml
      ZIGBEELENS_LOG_LEVEL: info
      TZ: UTC
    volumes:
      - ./config:/config:ro
      - ./data:/data
    # Healthcheck is defined in deploy/docker/Dockerfile (GET /api/health).
