# Standalone ZigbeeLens — copy to docker-compose.yaml and adjust.
#
# Quick start:
#   mkdir -p config data
#   cp deploy/docker/config.example.yaml config/config.yaml
#   docker compose -f deploy/docker/docker-compose.example.yaml up -d
#
# Port 8377 is published on the Docker host for convenient local/trusted-network access.
# Core binds from AppConfig (Docker examples use server.host=0.0.0.0). Only the optional
# mutation-route API-key guard is available today; read routes/SSE remain open. If Core
# is reachable beyond users or networks you trust, access-control decisions are yours.
#
# Image: replace ghcr.io/theaussiepom/zigbeelens with your registry path.

services:
  zigbeelens:
    image: ghcr.io/theaussiepom/zigbeelens:latest
    container_name: zigbeelens
    restart: unless-stopped
    ports:
      - "8377:8377"
    environment:
      ZIGBEELENS_CONFIG: /config/config.yaml
      ZIGBEELENS_LOG_LEVEL: info
      TZ: UTC
    volumes:
      - ./config:/config:ro
      - ./data:/data
    # Healthcheck is defined in deploy/docker/Dockerfile (GET /api/health).
