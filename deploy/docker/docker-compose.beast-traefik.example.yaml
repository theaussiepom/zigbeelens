# ZigbeeLens on Beast — Traefik HTTPS route for optional HACS embedded view.
#
# Merge the `zigbeelens` service below into:
#   /mnt/nas/docker/automation/docker-compose.yml
#
# Follows existing Beast conventions (same label style as Music Assistant / Node-RED):
#   entrypoints: https
#   tls.certresolver: cloudflare
#   middlewares: local@file, authentik@file, securityHeadersZigbeeLens@file
#
# Before starting:
# 1. Copy deploy/traefik/security-headers-zigbeelens.yaml.example to Traefik middlewares dir
#    (allows Google Fonts + Home Assistant iframe — do not use securityHeadersUnsafe@file).
# 2. Copy deploy/traefik/zigbeelens-router.yaml.example to Traefik routers dir
#    (API bypass: /api without Authentik so HACS config flow works over HTTPS).
# 3. Ensure DNS: zigbeelens.${DOMAIN} → Beast (Cloudflare / Pi-hole).
# 4. Create NAS path: automation/zigbeelens on the `docker` volume
#    (config.yaml + SQLite live in that folder — see other automation services).
# 5. Attach to `underground` (Traefik) and `mqtt` (collector) networks.
#
# HACS Core URL examples (see docs/hacs-embedded-view.md):
#   http://192.168.100.5:8377              — convenient LAN access (no Authentik on /api)
#   https://zigbeelens.theaussiepom.me     — optional HTTPS / embedded view (Authentik on UI)
# Wrong: https://zigbeelens.theaussiepom.me:8377  (Traefik is on 443 only)
#
# Local HTTP on port 8377 is kept for LAN troubleshooting. If you expose that route beyond
# users or networks you trust, scope it intentionally (for example firewall rules) or accept
# the access-control risk. HTTPS via Traefik adds TLS, not authentication — Authentik is one
# optional protection pattern for the UI route.

volumes:
  docker:
    name: docker
    external: true

services:
  zigbeelens:
    image: ghcr.io/theaussiepom/zigbeelens:edge
    container_name: zigbeelens
    hostname: zigbeelens
    restart: always
    ports:
      - "8377:8377"
    environment:
      ZIGBEELENS_CONFIG: /data/config.yaml
      ZIGBEELENS_LOG_LEVEL: info
      TZ: ${TZ}
    volumes:
      - type: volume
        source: docker
        target: /data
        read_only: false
        volume:
          subpath: automation/zigbeelens
    labels:
      traefik.enable: true
      traefik.http.routers.zigbeelens.tls: true
      traefik.http.routers.zigbeelens.tls.certresolver: cloudflare
      traefik.http.routers.zigbeelens.entrypoints: https
      traefik.http.routers.zigbeelens.rule: Host(`zigbeelens.${DOMAIN}`)
      # UI/dashboard only — /api is routed by deploy/traefik/zigbeelens-router.yaml.example
      traefik.http.routers.zigbeelens.middlewares: local@file,authentik@file,securityHeadersZigbeeLens@file
      traefik.http.services.zigbeelens.loadbalancer.server.port: 8377
      traefik.http.services.zigbeelens.loadbalancer.passhostheader: true
    expose:
      - "8377"
    dns:
      - 172.20.0.2
      - 172.20.0.3
    networks:
      underground:
      mqtt:
    # Healthcheck is defined in deploy/docker/Dockerfile (GET /healthz).

networks:
  underground:
    external: true
  mqtt:
    external: true
