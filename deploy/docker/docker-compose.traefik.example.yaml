# ZigbeeLens behind Traefik — subdomain deployment (recommended).
#
# Beast homelab example with existing Traefik conventions:
#   deploy/docker/docker-compose.beast-traefik.example.yaml
#   deploy/traefik/security-headers-zigbeelens.yaml.example
#
# Prerequisites:
# - Traefik running with docker provider and a public entrypoint
# - DNS for zigbeelens.example.com pointing at your host
#
# Core currently has typed security config and an optional bearer authentication when an API token is configured;
# local/no-token remains trusted-open. If Core is reachable beyond users or networks you trust,
# access-control decisions are your responsibility (firewall rules, network isolation,
# VPN, or an authenticated reverse proxy).
#
# SSE/WebSocket: enable buffering off on the Traefik service if live updates stall.

services:
  zigbeelens:
    image: ghcr.io/theaussiepom/zigbeelens:latest
    container_name: zigbeelens
    restart: unless-stopped
    environment:
      ZIGBEELENS_CONFIG: /config/config.yaml
      ZIGBEELENS_LOG_LEVEL: info
    volumes:
      - ./config:/config:ro
      - ./data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.zigbeelens.rule=Host(`zigbeelens.example.com`)
      - traefik.http.routers.zigbeelens.entrypoints=websecure
      - traefik.http.routers.zigbeelens.tls=true
      - traefik.http.services.zigbeelens.loadbalancer.server.port=8377
      # Helps Server-Sent Events (live dashboard updates) through Traefik.
      - traefik.http.services.zigbeelens.loadbalancer.passhostheader=true
    networks:
      - proxy
    # Healthcheck is defined in deploy/docker/Dockerfile (GET /healthz).

networks:
  proxy:
    external: true
