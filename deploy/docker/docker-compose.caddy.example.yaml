# ZigbeeLens + Caddy — HTTPS reverse proxy for optional HACS embedded view.
#
# Use this when Home Assistant is HTTPS and you want "Try Embedded View" in the
# HACS companion panel to iframe the full Core dashboard (mixed-content safe).
#
# Normal Docker + HACS does NOT require this. Open Full Dashboard (new tab) works
# with plain http://<host>:8377.
#
# Quick start:
#   mkdir -p config data
#   cp deploy/docker/config.example.yaml config/config.yaml
#   cp deploy/docker/Caddyfile.example Caddyfile
#   # Edit Caddyfile hostname; add DNS/hosts entry → Docker host IP
#   docker compose -f deploy/docker/docker-compose.caddy.example.yaml up -d
#
# Then in Home Assistant → ZigbeeLens → Reconfigure:
#   Core URL: https://zigbeelens.home.arpa:8443   (match your Caddyfile + port map)
#
# See docs/hacs-embedded-view.md for full setup, certificate trust, and security notes.
#
# Core currently has typed security config and an optional bearer authentication when an API token is configured;
# local/no-token remains trusted-open. HTTPS below helps embedded view; it is not authentication.
# If Core is reachable beyond users or networks you trust, consider firewall rules,
# network isolation, VPN, or auth at the proxy. Do not expose HTTPS publicly without auth.

services:
  zigbeelens:
    image: ghcr.io/theaussiepom/zigbeelens:latest
    container_name: zigbeelens
    restart: unless-stopped
    expose:
      - "8377"
    environment:
      ZIGBEELENS_CONFIG: /config/config.yaml
      ZIGBEELENS_LOG_LEVEL: info
      TZ: UTC
    volumes:
      - ./config:/config:ro
      - ./data:/data
    networks:
      - zigbeelens
    # Healthcheck is defined in deploy/docker/Dockerfile (GET /healthz).

  caddy:
    image: caddy:2-alpine
    container_name: zigbeelens-caddy
    restart: unless-stopped
    ports:
      # 8443 avoids conflicting with other TLS services on the same host.
      # Map 443:443 instead if this stack owns the host's HTTPS port.
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - zigbeelens
    depends_on:
      - zigbeelens

networks:
  zigbeelens:

volumes:
  caddy_data:
  caddy_config:
