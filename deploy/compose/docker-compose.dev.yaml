services:
  core:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8377:8377"
    environment:
      # Dedicated container config with server.host=0.0.0.0 (not the source loopback default).
      ZIGBEELENS_CONFIG: /config/config.dev.yaml
      ZIGBEELENS_MOCK_SCENARIO: four_devices_same_room_unavailable
    volumes:
      - ../../apps/core/src:/app/apps/core/src:ro
      - ./config.dev.yaml:/config/config.dev.yaml:ro
      - ../../data:/app/data

  ui:
    image: node:22-bookworm
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @zigbeelens/shared build && pnpm --filter @zigbeelens/ui dev --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://core:8377
    volumes:
      - ../..:/app
    depends_on:
      - core
